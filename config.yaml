# Central configuration — all paths, model settings, and pipeline parameters live here.
# Import with: from src.data import load_config; cfg = load_config()

paths:
  raw_dir:       data/raw
  processed_dir: data/processed
  model_dir:     models
  model_file:    models/ltv_model.pkl
  shap_cache:    models/shap_features.json

data:
  # Cutoff date — features use orders before this date; target uses orders after
  cutoff_date: "2018-07-01"
  # Prediction horizon: how many days after cutoff to measure future spend
  horizon_days: 90
  # Only include customers with at least one delivered order before cutoff
  min_orders: 1
  # Only score delivered orders — exclude cancelled/unavailable
  valid_statuses: ["delivered"]

split:
  train_frac: 0.80   # chronological 80/20 split — no random shuffling

features:
  # RFM windows (days) for velocity/recency features
  recency_windows: [30, 60, 90]
  # Top N features selected by mean |SHAP| value
  shap_top_n: 80

model:
  random_state: 42
  n_estimators: 500

  # Stage 1: will the customer return? (binary classifier)
  stage1:
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8
    scale_pos_weight: auto   # set to neg/pos ratio at training time

  # Stage 2: spend tier — High / Mid / Low (classifier, trained on returners only)
  # Tiers are tertiles of future_spend among training-set returners
  stage2:
    learning_rate: 0.05
    max_depth: 4
    subsample: 0.8
    colsample_bytree: 0.8
    num_class: 3   # 0=Low, 1=Mid, 2=High

tuning:
  n_trials: 50
  cv_folds: 5

api:
  host: 0.0.0.0
  port: 8000
