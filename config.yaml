# Central configuration — all paths, model settings, and pipeline parameters live here.
# Import with: from src.data import load_config; cfg = load_config()

paths:
  raw_dir:       data/raw
  processed_dir: data/processed
  model_dir:     models
  model_file:    models/ltv_model.pkl
  shap_cache:    models/shap_features.json

data:
  # Prediction horizon: how many days ahead to predict customer spend
  horizon_days: 90
  # Observation window: how many days of history to use for features
  observation_days: 180
  # Minimum orders a customer must have to be included in training
  min_orders: 1

split:
  train_frac: 0.80   # chronological 80/20 split — no random shuffling

features:
  # RFM windows (days) for velocity/recency features
  recency_windows: [30, 60, 90]
  # Top N features selected by mean |SHAP| value
  shap_top_n: 80

model:
  # XGBoost regression — predicts 90-day future spend per customer
  n_estimators: 500
  learning_rate: 0.05
  max_depth: 6
  subsample: 0.8
  colsample_bytree: 0.8
  random_state: 42

tuning:
  n_trials: 50
  cv_folds: 5

api:
  host: 0.0.0.0
  port: 8000
